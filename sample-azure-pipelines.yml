# IMPORTANT: The repo lives in Azure Repos, where pull-request triggers are NOT
# driven by the `pr:` block below. Instead you must add a Build Validation branch
# policy on your default branch for example `main` that runs this pipeline (see setup notes at the bottom).
#
# Required pipeline variables (Pipeline > Edit > Variables):
#   OPENAI_API_KEY  (secret)  - your OpenAI API key
#
# This pipeline pulls the prebuilt nitpicker container image instead of cloning
# and compiling it on every run, which removes the Go install + clone + build
# overhead. Override NITPICKER_IMAGE to pin a version or use your own registry.

trigger: none      # build on PR validation only, not on pushes
pr: none           # ignored by Azure Repos; PR builds come from the branch policy

pool:
  vmImage: ubuntu-latest

variables:
  NITPICKER_IMAGE: ghcr.io/hazardemircan/nitpicker:latest

steps:
  - checkout: self
    persistCredentials: true   # lets nitpicker call the Azure DevOps REST API
    fetchDepth: 0              # full history so the diff merge-base resolves

  - script: |
      set -e
      docker run --rm \
        -e SYSTEM_ACCESSTOKEN \
        -e OPENAI_API_KEY \
        -e SYSTEM_TEAMFOUNDATIONCOLLECTIONURI \
        -e SYSTEM_TEAMPROJECT \
        -e BUILD_REPOSITORY_ID \
        -e SYSTEM_PULLREQUEST_PULLREQUESTID \
        -e SYSTEM_PULLREQUEST_TARGETBRANCHNAME \
        -e BUILD_REPOSITORY_LOCALPATH=/repo \
        -v "$(Build.Repository.LocalPath):/repo" \
        "$(NITPICKER_IMAGE)"
    displayName: AI Code Review
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      OPENAI_API_KEY: $(OPENAI_API_KEY)
