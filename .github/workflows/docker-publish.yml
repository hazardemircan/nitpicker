# Builds the nitpicker container image and publishes it to the GitHub Container
# Registry (GHCR). Publishing is release-driven: an image is built only when a
# version tag (v*) is pushed, so merges to main do not create extra packages.
#
#   ghcr.io/<owner>/nitpicker
#
# Tags produced per release (e.g. v1.2.3):
#   - 1.2.3, 1.2, 1   (semver)
#   - latest          (newest non-prerelease release)
#   - sha-<short-sha> (traceability)
name: Publish Docker image

on:
  push:
    tags: ["v*"]
  # Lets you publish on demand from the Actions tab.
  workflow_dispatch:

# Avoid overlapping publishes for the same ref.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Gate publishing behind an environment so it can require a manual approval.
    # Configure required reviewers under Settings > Environments > release.
    environment: release
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so the on-main check below can resolve

      # Refuse to publish a tag that points at a commit not contained in main.
      # Defeats tagging a malicious feature branch to trigger a release build.
      - name: Verify tag is on main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "OK: $GITHUB_REF_NAME ($GITHUB_SHA) is on main."
          else
            echo "::error::Refusing to publish: tag commit is not on origin/main."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest=auto (the default) tags :latest on non-prerelease releases.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
